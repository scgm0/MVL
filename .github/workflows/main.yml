name: Build MVL Project

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    container:
      image: archlinux:latest
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux-Mono
            cache-name: linux-mono
            bin: ./godot/bin/godot.linuxbsd.editor.x86_64.llvm.mono

    steps:
      - name: Checkout MVL Repository
        uses: actions/checkout@v4
        with:
          path: mvl-repo

      - name: 1. Setup Arch Linux Environment & Dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel git wget python scons yasm clang lld p7zip unzip mingw-w64-gcc mold
          pacman -S --noconfirm mesa glu libx11 libxcursor libxinerama libxrandr libxi udev dbus pulseaudio alsa-lib pkgconf gcc wayland-utils libglvnd

          echo "Creating non-root user 'builder' for makepkg..."
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

          echo "Cloning and installing paru..."
          git clone https://aur.archlinux.org/paru.git
          chown -R builder:builder paru
          cd paru
          sudo -u builder makepkg -si --noconfirm
          cd ..
          rm -rf paru

          echo "Installing packages from AUR..."
          sudo -u builder paru -S --noconfirm appimagetool-bin

      - name: 2.1. Setup .NET8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' 

      - name: 2.2. Setup .NET10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: 3. Download and Setup Vintage Story Clients
        run: |
          echo "Setting up Vintage Story environments..."
          wget https://cdn.vintagestory.at/gamefiles/stable/vs_client_linux-x64_1.21.5.tar.gz
          mkdir -p NET8
          tar -xzf vs_client_linux-x64_1.21.5.tar.gz -C NET8
          echo "VINTAGE_STORY_NET8=$(pwd)/NET8/vintagestory" >> $GITHUB_ENV

          wget https://cdn.vintagestory.at/gamefiles/stable/vs_client_linux-x64_1.20.9.tar.gz
          mkdir -p NET7
          tar -xzf vs_client_linux-x64_1.20.9.tar.gz -C NET7
          echo "VINTAGE_STORY_NET7=$(pwd)/NET7/vintagestory" >> $GITHUB_ENV

          echo "Vintage Story paths set."

      - name: 4.1. Clone Godot & Cache SCons
        id: godot-build
        run: |
          git clone https://github.com/scgm0/godot.git --branch Fix-RenderingDevice-Opengl3

      - name: 4.2. Restore Godot build cache
        uses: ./mvl-repo/.github/actions/godot-cache-restore
        with:
          cache-name: ${{ matrix.cache-name }}
        continue-on-error: true

      - name: Store unix timestamp
        shell: sh
        run: echo "CACHE_TIMESTAMP=$(date +%s)" >> $GITHUB_ENV

      - name: Compilation Editor
        uses: ./mvl-repo/.github/actions/godot-build
        with:
          scons-flags: >-
            scu_build=yes
            linker=mold
            module_mono_enabled=yes
            use_llvm=yes
            accesskit=no
            disable_xr=yes
          platform: linuxbsd
          target: editor

      - name: Compilation Release
        uses: ./mvl-repo/.github/actions/godot-build
        with:
          scons-flags: >-
            scu_build=yes
            linker=mold
            module_mono_enabled=yes
            accesskit=no
            disable_xr=yes
          platform: linuxbsd
          target: template_release

      - name: 4.4. Save Godot build cache
        uses: ./mvl-repo/.github/actions/godot-cache-save
        with:
          cache-name: ${{ matrix.cache-name }}
        continue-on-error: true

      - name: Generate C# glue
        run: |
          cd godot
          ${{ matrix.bin }} --headless --generate-mono-glue ./modules/mono/glue
          ./modules/mono/build_scripts/build_assemblies.py --godot-output-dir=./bin --push-nupkgs-local ./bin/GodotSharp/Tools/nupkgs --godot-platform=linuxbsd

      - name: 5. Build and Export MVL Project
        run: |
          echo "Building MVL solution..."
          dotnet build mvl-repo/MVL

          echo "Importing assets with Godot..."
          ${{ matrix.bin }} --path mvl-repo/MVL --import --headless

          echo "Exporting project..."
          cat > mvl-repo/MVL/export_presets.cfg <<EOF
          [preset.0]

          name="Linux"
          platform="Linux"
          runnable=true
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter="Misc/*"
          exclude_filter="Assets/Icon/MD/icons.json"
          export_path="../Export/linux/MVL.x86_64"
          patches=PackedStringArray()
          encryption_include_filters=""
          encryption_exclude_filters=""
          seed=0
          encrypt_pck=false
          encrypt_directory=false
          script_export_mode=2

          [preset.0.options]

          custom_template/debug=""
          custom_template/release="/home/scgm/GodotBuild/godot/bin/godot.linuxbsd.template_release.x86_64.mono"
          debug/export_console_wrapper=1
          binary_format/embed_pck=false
          texture_format/s3tc_bptc=true
          texture_format/etc2_astc=false
          shader_baker/enabled=false
          binary_format/architecture="x86_64"
          dotnet/include_scripts_content=false
          dotnet/include_debug_symbols=false
          dotnet/embed_build_outputs=false

          EOF

          mkdir -p export_build
          ${{ matrix.bin }} --path mvl-repo/MVL --headless --export-release "Linux" ../export_build/MVL.x86_64

          echo "Export finished."

      - name: 6. Package as AppImage
        run: |
          echo "Creating AppImage structure..."
          mkdir -p AppDir

          cp export_build/MVL.x86_64 AppDir/
          cp export_build/MVL.pck AppDir/

          cat > AppDir/AppRun <<EOF
          #!/bin/sh
          set -e

          this_dir="\$(readlink -f "\$(dirname "\$0")")"

          export PATH="\$this_dir":"\$PATH"

          exec "\$this_dir"/MVL.x86_64 "\$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/mvl.desktop <<EOF
          [Desktop Entry]
          Name=MVL
          Name[zh_CN]=神麤詭末的复古物语启动器
          Exec=MVL
          Icon=icon
          Type=Application
          Comment=一个开源的复古物语启动器
          Categories=Game;Utility;
          EOF

          cp mvl-repo/MVL/Assets/Icon/icon.svg AppDir/icon.svg

          echo "Generating AppImage..."
          appimagetool AppDir MVL-x86_64.AppImage

      - name: 7. Upload AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MVL-Linux-AppImage
          path: MVL-x86_64.AppImage

